default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "oxlint"
name = "oxlint"
language = "system"
entry = "pnpm --filter @web-speed-hackathon-2026/application run format:oxlint"
pass_filenames = false
stages = ["pre-commit"]
types_or = ["ts", "tsx", "javascript", "jsx"]

[[repos.hooks]]
id = "oxfmt"
name = "oxfmt"
language = "system"
entry = "pnpm --filter @web-speed-hackathon-2026/application run format:oxfmt"
pass_filenames = false
stages = ["pre-commit"]
types_or = ["ts", "tsx", "javascript", "jsx"]

[[repos.hooks]]
id = "typecheck"
name = "typecheck"
language = "system"
entry = "pnpm --filter @web-speed-hackathon-2026/application run typecheck"
pass_filenames = false
always_run = true
stages = ["pre-commit"]

[[repos.hooks]]
id = "api-test"
name = "api-test"
language = "system"
entry = "bash -c 'cd application && PORT=13000 pnpm --filter @web-speed-hackathon-2026/server start &>/tmp/prek-api-test-server.log & SERVER_PID=$!; sleep 4; E2E_BASE_URL=http://localhost:13000 pnpm --filter @web-speed-hackathon-2026/e2e exec playwright test --project=\"API Contract\" --project=\"API Initialize\"; EXIT=$?; kill $SERVER_PID 2>/dev/null; wait $SERVER_PID 2>/dev/null; exit $EXIT'"
pass_filenames = false
always_run = true
stages = ["pre-commit"]

